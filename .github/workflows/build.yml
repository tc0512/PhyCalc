name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Build APK with Docker (Bypass root check)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            kivy/buildozer:latest \
            bash -c "sed -i '/def check_root/,/^[[:space:]]*$/d' /home/user/.venv/lib/python3.12/site-packages/buildozer/__init__.py && echo y | buildozer android debug"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PhyCalc-APK
          path: bin/*.apk
