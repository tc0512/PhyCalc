name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Clone repository manually
        run: |
          git clone https://github.com/tc0512/PhyCalc.git /tmp/PhyCalc
          cd /tmp/PhyCalc

      - name: Build APK with Docker
        run: |
          docker run --rm \
            -v /tmp/PhyCalc:/app \
            -w /app \
            kivy/buildozer:latest \
            bash -c "yes | buildozer android debug"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PhyCalc-APK
          path: /tmp/PhyCalc/bin/*.apk
