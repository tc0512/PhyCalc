name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build APK with Docker (Python 3.10)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            kivy/buildozer:3.10 \
            bash -c "echo y | buildozer android debug"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PhyCalc-APK
          path: bin/*.apk
