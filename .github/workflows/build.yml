name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip openjdk-17-jdk \
          python3-pip autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev \
          libtinfo5 cmake libffi-dev libssl-dev

    - name: Install buildozer and dependencies
      run: |
        pip install buildozer cython
        # 安装 Cython 兼容版本
        pip install --upgrade cython==0.29.33

    - name: Create .buildozer default profile
      run: |
        buildozer init

    - name: Update buildozer.spec for GitHub Actions
      run: |
        # 设置 Android SDK/NDK 为本地路径
        sed -i 's|# android.accept_sdk_license = False|android.accept_sdk_license = True|' buildozer.spec
        sed -i 's|# android.ndk = .*|android.ndk = 23b|' buildozer.spec
        sed -i 's|# android.sdk = .*|android.sdk = 24|' buildozer.spec

    - name: Build APK
      run: |
        # 首次编译会下载 SDK/NDK，耗时较长
        buildozer android debug

    - name: Upload APK artifacts
      uses: actions/upload-artifact@v4
      with:
        name: kivy-apk
        path: bin/*.apk
        retention-days: 30

    - name: Upload logs if build fails
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: buildozer-logs
        path: .buildozer/logs/
