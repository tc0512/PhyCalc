name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build APK with Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            kivy/buildozer:latest \
            bash -c "pip install setuptools && echo y | buildozer android debug"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PhyCalc-APK
          path: bin/*.apk
